# Template NGINX - Reverse Proxy e Segurança para Codeuprof (Orion Studio)
# Salve isso em /etc/nginx/sites-available/codeuprof e faça o symlink para sites-enabled

# --- Rate Limiting Zone ---
# Define the zone 'api_limit' to track connection states based on the binary IP address.
# Allocates 10MB of memory for the state and limits to 10 requests per second.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Optional: Add another zone for more strict endpoints if needed.
# limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=2r/s;

server {
    listen 80;
    server_name api.codigodoeuprofundo.com;

    # O Certbot irá automaticamente adicionar as diretivas SSL aqui, como `listen 443 ssl`
    
    # Redireciona tudo para HTTPS (o certbot pode configurar isso automaticamente)
    # return 301 https://$host$request_uri;

    location / {
        # --- Reverse Proxy para o Backend (FastAPI via Docker) ---
        # Porta no host definida no docker-compose.yml: 8001
        proxy_pass http://localhost:8001;

        # Headers necessários
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Suporte a WebSockets e SSE (Server-Sent Events) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Desativa o buffer para respostas em streaming (SSE) no LangGraph
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # --- Rate Limiting ---
        # Aplica o limite definido em limit_req_zone
        # burst=20 permite picos de até 20 requisições
        # nodelay processa requisições imediatamente se o limite não for excedido
        limit_req zone=api_limit burst=20 nodelay;
        
        # Pode definir páginas de erro personalizadas para Rate Limit (HTTP 429)
        # error_page 429 /429.json;
    }

    # location = /429.json {
    #     default_type application/json;
    #     return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded"}';
    # }
}
