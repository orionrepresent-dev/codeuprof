version: '3.8'

networks:
  coolify:
    external: true

services:
  backend:labels:
      - "coolify.managed=true"
      - "coolify.port=8000"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`cod.orionconsultoria.cloud`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    networks:
      - coolify
    expose:
      - 8000
    labels:
      - "coolify.managed=true"
      - "coolify.port=8000"
    # ... resto das configurações (volumes, depends_on)

  redis:
    image: redis/redis-stack-server:latest
    restart: always
    networks:
      - coolify
    # ... resto das configurações (healthcheck)
