version: '3.8'

networks:
  coolify:
    external: true

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    networks:
      - coolify
    expose:
      - 8000
    labels:
      - "coolify.managed=true"
      - "coolify.port=8000"
    # ... resto das configurações (volumes, depends_on)

  redis:
    image: redis/redis-stack-server:latest
    restart: always
    networks:
      - coolify
    # ... resto das configurações (healthcheck)
