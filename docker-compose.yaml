version: '3.8'

networks:
  coolify:
    external: true

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    networks:
      - coolify
    expose:
      - 8000
    labels:
      - "coolify.managed=true"
      - "coolify.port=8000"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`cod.orionconsultoria.cloud`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
    volumes:
      - ./backend/checkpoints:/app/backend/checkpoints
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis/redis-stack-server:latest
    restart: always
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
