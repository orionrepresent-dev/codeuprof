version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    volumes:
      - ./backend/checkpoints:/app/backend/checkpoints
    depends_on:
      redis:
        condition: service_healthy
    # O Coolify gerencia as portas automaticamente se você não definir 'ports' aqui
    # Se precisar de variáveis de ambiente, adicione-as no painel do Coolify, não aqui.

  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
