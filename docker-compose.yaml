name: codigodoeuprofundo

services:
  backend:
    build:
      context: ./backend.
      dockerfile: backend/Dockerfile
    restart: always
    volumes:
      - ./backend/checkpoints:/app/backend/checkpoints
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
